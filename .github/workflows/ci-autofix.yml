name: CI Auto-Fix (Claude Code)

on:
  workflow_run:
    workflows: ["CI — Test Suite"]
    types: [completed]
    branches: [main, develop]

jobs:
  auto-fix:
    name: Auto-fix CI failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Fetch failed CI logs into workspace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Fetching failed logs for run #$RUN_ID on branch $BRANCH"

          gh run view "$RUN_ID" --log-failed 2>&1 | head -400 > ci-failure-logs.txt
          echo "=== Log preview ===" && head -30 ci-failure-logs.txt

      - name: Run Claude Code auto-fix
        uses: anthropic/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            The CI pipeline just failed on branch `${{ github.event.workflow_run.head_branch }}` (run #${{ github.event.workflow_run.id }}).

            The failure logs are saved at `ci-failure-logs.txt` in the workspace root. Read that file first.

            Then:
            1. Identify the root cause of the failure
            2. Fix it by editing the relevant files
            3. Do NOT skip or weaken tests — fix the actual bug
            4. Keep changes minimal and focused on the failure

            Create a PR with your fix when done.
