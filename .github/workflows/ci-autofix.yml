name: CI Auto-Fix (Claude Code)

on:
  workflow_run:
    workflows: ["CI — Test Suite"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI run ID to fix (from CI — Test Suite)'
        required: true

jobs:
  auto-fix:
    name: Auto-fix CI failure
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch failed CI logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_RUN_ID="${{ github.event.workflow_run.id || inputs.run_id }}"
          gh run view "$TARGET_RUN_ID" --log-failed 2>&1 | head -400 > ci-failure-logs.txt || true
          echo "=== Log preview (sanitized) ==="
          head -40 ci-failure-logs.txt | sed 's/##\[error\]/[error]/g; s/##\[warning\]/[warning]/g' || true

      - name: Claude Code — analyze and fix
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-5
        run: |
          # Inject credentials into claude config so CLI skips interactive login
          mkdir -p ~/.config
          cat > ~/.claude.json << EOF
          {
            "hasCompletedOnboarding": true,
            "primaryApiKey": "${ANTHROPIC_API_KEY}"
          }
          EOF

          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          CI pipeline failed. The failure logs are in ci-failure-logs.txt in the workspace root.

          1. Read ci-failure-logs.txt to identify the root cause
          2. Fix it by editing the relevant files in this repo
          3. Do NOT skip or weaken tests — fix the actual bug
          4. Keep changes minimal and focused on the failure
          PROMPT_EOF

          claude --print --dangerously-skip-permissions "$(cat /tmp/prompt.txt)"

      - name: Create fix PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          RUN_ID="${{ github.event.workflow_run.id || inputs.run_id }}"
          FIX_BRANCH="autofix/ci-run-${RUN_ID}"

          git config user.name "claude-autofix[bot]"
          git config user.email "claude-autofix[bot]@users.noreply.github.com"

          # Only create PR if there are actual changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes made — skipping PR creation"
            exit 0
          fi

          git checkout -b "$FIX_BRANCH"
          git add -A
          # Exclude files Claude shouldn't modify
          git reset HEAD ci-failure-logs.txt 2>/dev/null || true
          git reset HEAD '.github/workflows/' 2>/dev/null || true

          # Only create PR if there are staged changes
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "No staged changes after exclusions — skipping PR creation"
            exit 0
          fi

          git commit -m "fix(autofix): CI run #${RUN_ID} — auto-fix by Claude Code"
          git push origin "$FIX_BRANCH"

          gh pr create \
            --base "$BRANCH" \
            --head "$FIX_BRANCH" \
            --title "fix: auto-fix CI failure (run #${RUN_ID})" \
            --body "$(printf '## Auto-fix by Claude Code\n\nCI run [#%s](https://github.com/${{ github.repository }}/actions/runs/%s) failed on branch \`%s\`.\n\nClaude Code analyzed the failure logs and applied this fix automatically.\n\n> ⚠️ Review carefully before merging.' "$RUN_ID" "$RUN_ID" "$BRANCH")"
